<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS Implementatie Roadmap — Lugdunium</title>
<style>
  :root {
    --bg-primary: #0a0f1a;
    --bg-surface: #111827;
    --bg-elevated: #1f2937;
    --bg-hover: #374151;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-subtle: rgba(99, 102, 241, 0.1);
    --accent-border: rgba(99, 102, 241, 0.3);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --border: #374151;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #22c55e;
    --sims: #a78bfa;
    --tims: #60a5fa;
    --lijn: #34d399;
    --phase0: #6366f1;
    --phase1: #8b5cf6;
    --phase2: #a855f7;
    --phase3: #c084fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    padding: 16px 24px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header h1 span {
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .progress-bar-container {
    width: 200px;
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--phase0), var(--phase2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 60px - 180px);
  }

  .sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .preset-btn {
    display: block;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }

  .preset-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent-border);
  }

  .preset-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .preset-btn.active {
    border-color: var(--accent);
    background: var(--accent-subtle);
  }

  .preset-btn small {
    display: block;
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  /* Filter chips */
  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .filter-chip {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover { border-color: var(--accent-border); }
  .filter-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .filter-chip.active {
    background: var(--accent-subtle);
    border-color: var(--accent);
    color: var(--text-primary);
  }

  /* Step list in sidebar */
  .step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
  }

  .step-item:hover { background: var(--bg-elevated); }

  .step-status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid var(--border);
    transition: all 0.15s;
  }

  .step-status-dot.niet-gestart { border-color: var(--text-muted); background: transparent; }
  .step-status-dot.bezig { border-color: var(--warning); background: var(--warning); }
  .step-status-dot.afgerond { border-color: var(--success); background: var(--success); }

  .step-item-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .step-item-num {
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    min-width: 22px;
  }

  /* Main roadmap */
  .roadmap {
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 60px - 180px);
  }

  .phase {
    margin-bottom: 32px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    color: white;
  }

  .phase-badge.fase-0 { background: var(--phase0); }
  .phase-badge.fase-1 { background: var(--phase1); }
  .phase-badge.fase-2 { background: var(--phase2); }
  .phase-badge.fase-3 { background: var(--phase3); }

  .phase-title {
    font-size: 16px;
    font-weight: 600;
  }

  .phase-timing {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .phase-progress {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .step-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }

  .step-card:hover {
    border-color: var(--accent-border);
    transform: translateY(-1px);
  }

  .step-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 12px rgba(99, 102, 241, 0.15);
  }

  .step-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .step-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .step-gremium {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .step-gremium.sims { background: rgba(167, 139, 250, 0.15); color: var(--sims); }
  .step-gremium.tims { background: rgba(96, 165, 250, 0.15); color: var(--tims); }
  .step-gremium.lijn { background: rgba(52, 211, 153, 0.15); color: var(--lijn); }

  .step-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .step-agent {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .step-agent::before {
    content: '🤖';
    font-size: 11px;
  }

  .step-outputs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }

  .output-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid transparent;
  }

  .output-tag.verplicht {
    border-color: rgba(99, 102, 241, 0.3);
    color: var(--accent-hover);
  }

  .output-tag.aanbevolen {
    border-color: rgba(107, 114, 128, 0.3);
  }

  .step-status-toggle {
    display: flex;
    gap: 4px;
  }

  .status-btn {
    flex: 1;
    padding: 4px 0;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .status-btn:first-child { border-radius: 4px 0 0 4px; }
  .status-btn:last-child { border-radius: 0 4px 4px 0; }
  .status-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .status-btn.active.niet-gestart { background: var(--bg-hover); color: var(--text-secondary); border-color: var(--text-muted); }
  .status-btn.active.bezig { background: rgba(245, 158, 11, 0.15); color: var(--warning); border-color: var(--warning); }
  .status-btn.active.afgerond { background: rgba(34, 197, 94, 0.15); color: var(--success); border-color: var(--success); }

  /* Go/no-go gate */
  .gate {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-surface);
    border: 1px dashed var(--accent-border);
    border-radius: 8px;
    margin-bottom: 24px;
  }

  .gate-icon {
    font-size: 20px;
  }

  .gate-content {
    flex: 1;
  }

  .gate-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-hover);
  }

  .gate-checklist {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .gate-status {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
  }

  .gate-status.open { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
  .gate-status.passed { background: rgba(34, 197, 94, 0.15); color: var(--success); }

  /* Prompt output */
  .prompt-panel {
    grid-column: 1 / -1;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    max-height: 180px;
    overflow-y: auto;
  }

  .prompt-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .prompt-header h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .copy-btn {
    padding: 4px 12px;
    font-size: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: var(--accent-hover); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .prompt-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    white-space: pre-wrap;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
    }
    .sidebar {
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <h1><span>IMS</span> Implementatie Roadmap</h1>
    <div class="header-meta">
      <span class="progress-label" id="progressLabel">0 / 22 stappen afgerond</span>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <h2>Voorinstellingen</h2>
      <button class="preset-btn" onclick="applyPreset('blanco')">
        Blanco start
        <small>Alles op "Niet gestart"</small>
      </button>
      <button class="preset-btn" onclick="applyPreset('leiden-nu')">
        Gemeente Leiden (nu)
        <small>Fase 0 stap 1-3 afgerond, rest bezig</small>
      </button>
      <button class="preset-btn" onclick="applyPreset('gemeente-ervaren')">
        Ervaren gemeente
        <small>Fase 0 af, Fase 1 bezig</small>
      </button>
      <button class="preset-btn" onclick="applyPreset('volwassen')">
        Volwassen organisatie
        <small>Fase 0+1 af, Fase 2 bezig</small>
      </button>
    </div>

    <div class="sidebar-section">
      <h2>Filter op fase</h2>
      <div class="filter-group" id="phaseFilters">
        <button class="filter-chip active" data-phase="all" onclick="togglePhaseFilter('all')">Alle</button>
        <button class="filter-chip" data-phase="0" onclick="togglePhaseFilter('0')">Fase 0</button>
        <button class="filter-chip" data-phase="1" onclick="togglePhaseFilter('1')">Fase 1</button>
        <button class="filter-chip" data-phase="2" onclick="togglePhaseFilter('2')">Fase 2</button>
        <button class="filter-chip" data-phase="3" onclick="togglePhaseFilter('3')">Fase 3</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>Filter op gremium</h2>
      <div class="filter-group" id="gremiumFilters">
        <button class="filter-chip active" data-gremium="all" onclick="toggleGremiumFilter('all')">Alle</button>
        <button class="filter-chip" data-gremium="SIMS" onclick="toggleGremiumFilter('SIMS')" style="color:var(--sims)">SIMS</button>
        <button class="filter-chip" data-gremium="TIMS" onclick="toggleGremiumFilter('TIMS')" style="color:var(--tims)">TIMS</button>
        <button class="filter-chip" data-gremium="Lijn" onclick="toggleGremiumFilter('Lijn')" style="color:var(--lijn)">Lijn</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>Stappen</h2>
      <div id="stepList"></div>
    </div>
  </aside>

  <!-- Main roadmap -->
  <main class="roadmap" id="roadmap"></main>

  <!-- Prompt output -->
  <div class="prompt-panel">
    <div class="prompt-header">
      <h3>Gegenereerde prompt</h3>
      <button class="copy-btn" onclick="copyPrompt()" id="copyBtn">Kopieer resultaat</button>
    </div>
    <div class="prompt-text" id="promptOutput">Selecteer een voorinstelling of pas de status van stappen aan om een voortgangsrapport te genereren.</div>
  </div>

</div>

<script>
const STEPS = [
  // Fase 0
  { id: '1', phase: 0, title: 'Bestuurlijk commitment', gremium: 'SIMS', agent: 'Commitment-agent',
    outputs: [{name:'Besluitmemo',va:'V'},{name:'Besluitlog #001',va:'V'}],
    iso: 'ISO 5.1' },
  { id: '2a', phase: 0, title: 'Organisatiecontext vaststellen', gremium: 'TIMS', agent: 'Context-agent',
    outputs: [{name:'Organisatiecontextdocument',va:'V'},{name:'Stakeholderregister',va:'V'},{name:'PII-rol bepaling',va:'V'}],
    iso: 'ISO 4.1, 4.2, 27701' },
  { id: '2b', phase: 0, title: 'Scope bepalen', gremium: 'SIMS', agent: 'Scope-agent',
    outputs: [{name:'Formeel scopebesluit',va:'V'}],
    iso: 'ISO 4.3' },
  { id: '3a', phase: 0, title: 'Governance- en beleidsvoorstel', gremium: 'TIMS', agent: 'Governance-agent',
    outputs: [{name:'Concept governance',va:'V'},{name:'Concept IMS-beleid',va:'V'},{name:'Communicatiematrix',va:'V'}],
    iso: 'ISO 5.2, 5.3, 7.4' },
  { id: '3b', phase: 0, title: 'Governance en beleid vaststellen', gremium: 'SIMS', agent: null,
    outputs: [{name:'Governance-besluit',va:'V'},{name:'IMS-beleid definitief',va:'V'},{name:'Besluitlog',va:'V'}],
    iso: 'ISO 5.2, 5.3' },
  { id: '4', phase: 0, title: 'Gap-analyse', gremium: 'TIMS', agent: 'Gap-agent',
    outputs: [{name:'Nulmeting per domein',va:'V'},{name:'Besluitlog',va:'V'}],
    iso: 'ISO 6.1' },
  { id: '5', phase: 0, title: 'Registers & risicobeoordeling', gremium: 'TIMS', agent: 'Register-agent',
    outputs: [{name:'Registerinventarisatie',va:'V'},{name:'Eerste risicobeeld',va:'V'},{name:'Risicobeoordelingsmethodiek',va:'V'}],
    iso: 'ISO 6.1, 6.1.2' },
  { id: '6', phase: 0, title: 'Normenkader & kerncontrols', gremium: 'SIMS', agent: 'Controls-agent',
    outputs: [{name:'Normenkader',va:'V'},{name:'Minimale werkset kerncontrols',va:'V'},{name:'Besluitlog',va:'V'}],
    iso: 'ISO Annex A' },

  // Fase 1
  { id: '7', phase: 1, title: 'Onboarding & awareness lijnmanagement', gremium: 'TIMS', agent: 'Onboarding-agent',
    outputs: [{name:'Awareness-materiaal',va:'V'},{name:'Competentiebeoordeling',va:'V'},{name:'Documentbeheerprocedure',va:'V'}],
    iso: 'ISO 7.2, 7.3, 7.5' },
  { id: '8', phase: 1, title: 'Koppeling processen, systemen & verwerkingen', gremium: 'TIMS', agent: 'Koppeling-agent',
    outputs: [{name:'Geintegreerd register',va:'V'},{name:'PII-doorgifte-inventarisatie (PIMS)',va:'V'},{name:'Privacy-by-design procedure',va:'V'}],
    iso: 'ISO 8.1, 27701 7.5/8.5, AVG art. 25' },
  { id: '9', phase: 1, title: 'Risicoanalyse door lijnmanagement', gremium: 'Lijn', agent: 'Risico-agent',
    outputs: [{name:'Risicoregister per afdeling',va:'V'},{name:'BIA (BCMS-track)',va:'V'}],
    iso: 'ISO 6.1.2, 22301 8.2.2' },
  { id: '10', phase: 1, title: 'Risicobehandeling & controls toewijzen', gremium: 'TIMS', agent: 'Behandel-agent',
    outputs: [{name:'Risicobehandelplan',va:'V'},{name:'Controls met eigenaren',va:'V'},{name:'Implementatieplan',va:'V'},{name:'Continuiteitsstrategieen (BCMS)',va:'V'},{name:'BCPs (BCMS)',va:'V'},{name:'PII-doorgifte-waarborgen (PIMS)',va:'V'}],
    iso: 'ISO 6.1.3, 8.1, 22301 8.3/8.4, 27701 7.5/8.5' },
  { id: '11', phase: 1, title: 'Statement of Applicability (SoA)', gremium: 'SIMS', agent: 'SoA-agent',
    outputs: [{name:'SoA incl. 27701 Annex A/B',va:'V'}],
    iso: 'ISO 27001 6.1.3d, 27701' },
  { id: '12', phase: 1, title: 'Monitoring & rapportage inrichten', gremium: 'TIMS', agent: 'Monitoring-agent',
    outputs: [{name:'Rapportagelijnen',va:'V'},{name:'KPIs',va:'A'},{name:'Dashboards',va:'A'}],
    iso: 'ISO 9.1' },

  // Fase 2
  { id: '13', phase: 2, title: 'Interne audit plannen & uitvoeren', gremium: 'TIMS', agent: 'Interne-audit-agent',
    outputs: [{name:'Auditprogramma',va:'V'},{name:'Auditrapportages',va:'V'},{name:'BC-oefenrapportage (BCMS)',va:'V'}],
    iso: 'ISO 9.2, 22301 8.5' },
  { id: '14', phase: 2, title: 'Management review', gremium: 'SIMS', agent: 'Review-agent',
    outputs: [{name:'Review-rapportage (inputchecklist 9.3.2)',va:'V'},{name:'Verbeterbeslissingen',va:'V'}],
    iso: 'ISO 9.3' },
  { id: '15', phase: 2, title: 'Afwijkingen, incidenten & corrigerende maatregelen', gremium: 'TIMS', agent: 'Afwijkingen-agent',
    outputs: [{name:'Non-conformiteitenregister',va:'V'},{name:'Correctieve acties',va:'V'},{name:'Incidentmanagementprocedure',va:'V'}],
    iso: 'ISO 10.1, 10.2, A.5.24-28' },
  { id: '16', phase: 2, title: 'Evidence-verzameling & control-monitoring', gremium: 'Lijn', agent: 'Evidence-agent',
    outputs: [{name:'Bewijs per control',va:'V'},{name:'Continue monitoring',va:'V'},{name:'Privacy procedures (PIMS)',va:'V'}],
    iso: 'ISO 9.1, 27701 A/B' },
  { id: '17', phase: 2, title: 'PDCA-cyclus formaliseren', gremium: 'SIMS', agent: 'PDCA-agent',
    outputs: [{name:'Jaarplanning',va:'V'},{name:'Reviewcyclus',va:'V'},{name:'Risicoherbeoordeling',va:'V'},{name:'Communicatieprocedures',va:'V'},{name:'Verbeterdoelen',va:'A'}],
    iso: 'ISO 8.1, 8.2, 9.3, 7.4, 22301 8.4.3' },

  // Fase 3 (optioneel)
  { id: '18', phase: 3, title: 'Certificeringsgereedheid', gremium: 'SIMS', agent: 'Audit-agent',
    outputs: [{name:'Pre-audit rapport',va:'A'},{name:'Gap-remediatie',va:'A'},{name:'Certificeringsaanvraag',va:'A'}],
    iso: 'ISO 27001, 22301, 27701' },
  { id: '19', phase: 3, title: 'Geavanceerde analytics & rapportage', gremium: 'TIMS', agent: 'Analytics-agent',
    outputs: [{name:'Trendanalyses',va:'A'},{name:'Predictive risk',va:'A'},{name:'Geautomatiseerde rapportages',va:'A'}],
    iso: '' },
  { id: '20', phase: 3, title: 'Externe integraties', gremium: 'TIMS', agent: 'Integratie-agent',
    outputs: [{name:'Ketenpartner-koppelingen',va:'A'},{name:'Leveranciersportaal',va:'A'}],
    iso: '' },
  { id: '21', phase: 3, title: 'Multi-framework optimalisatie', gremium: 'TIMS', agent: 'Framework-agent',
    outputs: [{name:'Cross-mapping controls',va:'A'}],
    iso: '' },
  { id: '22', phase: 3, title: 'Benchmarking & kennisdeling', gremium: 'SIMS', agent: 'Benchmark-agent',
    outputs: [{name:'Benchmark-rapportage',va:'A'},{name:'Best practice bibliotheek',va:'A'}],
    iso: '' },
];

const PHASES = [
  { id: 0, title: 'Fundament', timing: 'Q1-Q2 2026', badge: 'Fase 0',
    gate: { title: 'Go/No-Go — Overgang naar Fase 1', checklist: '8 criteria: governance, scope, gap-analyse, registers, risico\'s, normenkader, beleid, resources' }},
  { id: 1, title: 'Lijnmanagement doet risicoanalyse', timing: 'Q3 2026', badge: 'Fase 1',
    gate: { title: 'Go/No-Go — Overgang naar Fase 2', checklist: '5 criteria: risicoanalyse, controls, SoA, rapportagelijn, onboarding' }},
  { id: 2, title: 'PDCA draait, controls, evidence', timing: 'Q1 2027', badge: 'Fase 2', gate: null },
  { id: 3, title: 'Volwassen GRC-platform (optioneel)', timing: '2028+', badge: 'Fase 3', gate: null },
];

const PRESETS = {
  'blanco': () => STEPS.map(s => ({ id: s.id, status: 'niet-gestart' })),
  'leiden-nu': () => STEPS.map(s => {
    if (s.phase === 0 && ['1','2a','2b','3a','3b'].includes(s.id)) return { id: s.id, status: 'afgerond' };
    if (s.phase === 0) return { id: s.id, status: 'bezig' };
    return { id: s.id, status: 'niet-gestart' };
  }),
  'gemeente-ervaren': () => STEPS.map(s => {
    if (s.phase === 0) return { id: s.id, status: 'afgerond' };
    if (s.phase === 1 && ['7','8','9'].includes(s.id)) return { id: s.id, status: 'bezig' };
    return { id: s.id, status: 'niet-gestart' };
  }),
  'volwassen': () => STEPS.map(s => {
    if (s.phase <= 1) return { id: s.id, status: 'afgerond' };
    if (s.phase === 2 && ['13','14'].includes(s.id)) return { id: s.id, status: 'bezig' };
    return { id: s.id, status: 'niet-gestart' };
  }),
};

// State
const state = {
  steps: STEPS.map(s => ({ id: s.id, status: 'niet-gestart' })),
  phaseFilter: 'all',
  gremiumFilter: 'all',
  selectedStep: null,
};

function getStepStatus(id) {
  const s = state.steps.find(x => x.id === id);
  return s ? s.status : 'niet-gestart';
}

function setStepStatus(id, status) {
  const s = state.steps.find(x => x.id === id);
  if (s) s.status = status;
  updateAll();
}

function cycleStatus(id) {
  const order = ['niet-gestart', 'bezig', 'afgerond'];
  const current = getStepStatus(id);
  const next = order[(order.indexOf(current) + 1) % order.length];
  setStepStatus(id, next);
}

function applyPreset(name) {
  state.steps = PRESETS[name]();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.preset-btn').classList.add('active');
  updateAll();
}

function togglePhaseFilter(phase) {
  state.phaseFilter = phase;
  document.querySelectorAll('#phaseFilters .filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.phase === phase);
  });
  renderRoadmap();
}

function toggleGremiumFilter(gremium) {
  state.gremiumFilter = gremium;
  document.querySelectorAll('#gremiumFilters .filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.gremium === gremium);
  });
  renderRoadmap();
}

function renderStepList() {
  const list = document.getElementById('stepList');
  list.innerHTML = STEPS.map(step => {
    const status = getStepStatus(step.id);
    return `<div class="step-item" onclick="cycleStatus('${step.id}')">
      <span class="step-item-num">${step.id}</span>
      <span class="step-status-dot ${status}"></span>
      <span class="step-item-label">${step.title}</span>
    </div>`;
  }).join('');
}

function renderRoadmap() {
  const roadmap = document.getElementById('roadmap');
  let html = '';

  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--sims)"></div> SIMS (strategisch)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tims)"></div> TIMS (tactisch)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--lijn)"></div> Lijnmanagement</div>
    <div class="legend-item"><div class="legend-dot" style="border:2px solid var(--text-muted);background:transparent;width:8px;height:8px"></div> Niet gestart</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Bezig</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Afgerond</div>
  </div>`;

  PHASES.forEach(phase => {
    if (state.phaseFilter !== 'all' && state.phaseFilter !== String(phase.id)) return;

    const phaseSteps = STEPS.filter(s => s.phase === phase.id);
    const filteredSteps = state.gremiumFilter === 'all'
      ? phaseSteps
      : phaseSteps.filter(s => s.gremium === state.gremiumFilter);

    const completed = phaseSteps.filter(s => getStepStatus(s.id) === 'afgerond').length;
    const total = phaseSteps.length;

    html += `<div class="phase">
      <div class="phase-header">
        <span class="phase-badge fase-${phase.id}">${phase.badge}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-progress">${completed}/${total} afgerond</span>
        <span class="phase-timing">${phase.timing}</span>
      </div>
      <div class="steps-grid">`;

    filteredSteps.forEach(step => {
      const status = getStepStatus(step.id);
      const gremiumClass = step.gremium === 'SIMS' ? 'sims' : step.gremium === 'TIMS' ? 'tims' : 'lijn';
      const gremiumLabel = step.gremium === 'Lijn' ? 'Lijnmanagement' : step.gremium;

      html += `<div class="step-card" onclick="selectStep('${step.id}')">
        <div class="step-card-header">
          <span class="step-num">Stap ${step.id}</span>
          <span class="step-gremium ${gremiumClass}">${gremiumLabel}</span>
        </div>
        <div class="step-title">${step.title}</div>
        ${step.agent ? `<div class="step-agent">${step.agent}</div>` : ''}
        <div class="step-outputs">
          ${step.outputs.map(o => `<span class="output-tag ${o.va === 'V' ? 'verplicht' : 'aanbevolen'}" title="${o.va === 'V' ? 'Verplicht' : 'Aanbevolen'}">${o.va} ${o.name}</span>`).join('')}
        </div>
        <div class="step-status-toggle">
          <button class="status-btn niet-gestart ${status === 'niet-gestart' ? 'active' : ''}" onclick="event.stopPropagation();setStepStatus('${step.id}','niet-gestart')">Niet gestart</button>
          <button class="status-btn bezig ${status === 'bezig' ? 'active' : ''}" onclick="event.stopPropagation();setStepStatus('${step.id}','bezig')">Bezig</button>
          <button class="status-btn afgerond ${status === 'afgerond' ? 'active' : ''}" onclick="event.stopPropagation();setStepStatus('${step.id}','afgerond')">Afgerond</button>
        </div>
      </div>`;
    });

    html += `</div></div>`;

    // Go/no-go gate
    if (phase.gate && (state.phaseFilter === 'all' || state.phaseFilter === String(phase.id))) {
      const allDone = phaseSteps.every(s => getStepStatus(s.id) === 'afgerond');
      html += `<div class="gate">
        <span class="gate-icon">${allDone ? '✅' : '🚧'}</span>
        <div class="gate-content">
          <div class="gate-title">${phase.gate.title}</div>
          <div class="gate-checklist">${phase.gate.checklist}</div>
        </div>
        <span class="gate-status ${allDone ? 'passed' : 'open'}">${allDone ? 'Doorgang' : 'Open'}</span>
      </div>`;
    }
  });

  roadmap.innerHTML = html;
}

function selectStep(id) {
  state.selectedStep = id;
  document.querySelectorAll('.step-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  updatePrompt();
}

function updateProgress() {
  const done = state.steps.filter(s => s.status === 'afgerond').length;
  const total = STEPS.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} stappen afgerond`;
}

function updatePrompt() {
  const prompt = document.getElementById('promptOutput');
  const done = state.steps.filter(s => s.status === 'afgerond');
  const bezig = state.steps.filter(s => s.status === 'bezig');
  const open = state.steps.filter(s => s.status === 'niet-gestart');

  if (done.length === 0 && bezig.length === 0) {
    prompt.textContent = 'De gemeente staat aan het begin van het IMS-implementatietraject. Alle 22 stappen staan nog open. Begin bij stap 1: bestuurlijk commitment.';
    return;
  }

  const parts = [];

  // Determine current phase
  const phases = [0, 1, 2, 3];
  const phaseStatus = phases.map(p => {
    const steps = STEPS.filter(s => s.phase === p);
    const completed = steps.filter(s => getStepStatus(s.id) === 'afgerond').length;
    const inProgress = steps.filter(s => getStepStatus(s.id) === 'bezig').length;
    return { phase: p, total: steps.length, completed, inProgress };
  });

  parts.push(`IMS Implementatie voortgangsrapport voor de gemeente:`);
  parts.push('');

  phaseStatus.forEach(ps => {
    const phaseName = PHASES[ps.phase].title;
    let status = '';
    if (ps.completed === ps.total) status = '✅ Afgerond';
    else if (ps.inProgress > 0 || ps.completed > 0) status = `🔄 ${ps.completed}/${ps.total} afgerond, ${ps.inProgress} bezig`;
    else status = '⏳ Niet gestart';
    parts.push(`Fase ${ps.phase} (${phaseName}): ${status}`);
  });

  if (bezig.length > 0) {
    parts.push('');
    parts.push('Actieve stappen:');
    bezig.forEach(s => {
      const step = STEPS.find(x => x.id === s.id);
      parts.push(`- Stap ${s.id}: ${step.title} (${step.gremium}${step.agent ? ', ' + step.agent : ''})`);
    });
  }

  // Check go/no-go gates
  const fase0Steps = STEPS.filter(s => s.phase === 0);
  const fase0Done = fase0Steps.every(s => getStepStatus(s.id) === 'afgerond');
  const fase1Steps = STEPS.filter(s => s.phase === 1);
  const fase1Done = fase1Steps.every(s => getStepStatus(s.id) === 'afgerond');

  if (fase0Done && !fase1Done) {
    parts.push('');
    parts.push('📋 Fase 0 go/no-go: alle 8 stappen afgerond. De SIMS kan het go/no-go besluit nemen voor de overgang naar Fase 1 (lijnmanagement risicoanalyse).');
  }

  if (fase1Done) {
    parts.push('');
    parts.push('📋 Fase 1 go/no-go: alle 6 stappen afgerond. De SIMS kan het go/no-go besluit nemen voor de overgang naar Fase 2 (PDCA-cyclus).');
  }

  // Next steps
  if (open.length > 0 && open.length < STEPS.length) {
    const nextStep = STEPS.find(s => getStepStatus(s.id) === 'niet-gestart');
    if (nextStep) {
      parts.push('');
      parts.push(`Volgende stap: ${nextStep.id} — ${nextStep.title} (${nextStep.gremium})`);
    }
  }

  prompt.textContent = parts.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Gekopieerd!';
    setTimeout(() => btn.textContent = 'Kopieer resultaat', 1500);
  });
}

function updateAll() {
  renderStepList();
  renderRoadmap();
  updateProgress();
  updatePrompt();
}

// Init
updateAll();
</script>
</body>
</html>
