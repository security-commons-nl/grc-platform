name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: IMS/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: IMS/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # SQLite in-memory — geen PostgreSQL nodig voor unit tests
          POSTGRES_SERVER: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
          JWT_SECRET: test-secret-key-not-for-production
          AI_API_BASE: http://localhost:11434/v1
          AI_MODEL_NAME: mistral
        run: pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: IMS/backend/pytest-results.xml
          if-no-files-found: ignore
