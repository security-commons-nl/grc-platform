services:
  db:
    image: pgvector/pgvector:pg15
    container_name: ims-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-api
    restart: always
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
      POSTGRES_PORT: 5432
      AI_API_BASE: ${AI_API_BASE}
      AI_MODEL: ${AI_MODEL}
      # Multi-Provider AI Gateway
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      SCALEWAY_API_KEY: ${SCALEWAY_API_KEY}
      SCALEWAY_MODEL: ${SCALEWAY_MODEL:-mistral-nemo-instruct-2407}
      AI_PROVIDER_PRIORITY: ${AI_PROVIDER_PRIORITY:-mistral,scaleway}
      AI_TIMEOUT: ${AI_TIMEOUT:-120}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-changeme}
      # Non-superuser for RLS enforcement (if not set, falls back to POSTGRES_USER)
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims-frontend
    restart: always
    environment:
      API_URL: http://api:8000
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8002:8002"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4
    container_name: ims-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
